<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++ PhD-Level OOP Quiz</title>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Syne:wght@700;800&display=swap"
    rel="stylesheet">
  <style>
    /* ── TOKENS ──────────────────────────────────── */
    :root {
      --bg: #080b10;
      --surface: #0c1018;
      --card: #0f1520;
      --border: #1a2535;
      --border-hi: #263550;
      --green: #00e87a;
      --green-dk: #00b85e;
      --red: #ff3355;
      --amber: #ffb400;
      --blue: #3da8ff;
      --purple: #b06cff;
      --text: #c8dae8;
      --muted: #4a6680;
      --dim: #2a3d55;
      --code-bg: #050810;
      --mono: 'JetBrains Mono', monospace;
      --head: 'Syne', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px,
          rgba(0, 0, 0, 0.04) 3px, rgba(0, 0, 0, 0.04) 4px);
    }

    /* ── TOP BAR ─────────────────────────────────── */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8, 11, 16, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .logo {
      font-family: var(--head);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--green);
      text-shadow: 0 0 18px rgba(0, 232, 122, 0.4);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .logo em {
      color: var(--muted);
      font-style: normal;
    }

    .bar-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      min-width: 60px;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(.4, 0, .2, 1);
      box-shadow: 0 0 8px rgba(0, 232, 122, 0.5);
      width: 0%;
    }

    #score-badge {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    #score-badge span {
      color: var(--green);
    }

    #q-label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 56px;
      text-align: right;
    }

    /* ── LAYOUT ──────────────────────────────────── */
    #wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }

    /* ── CARD ────────────────────────────────────── */
    .qcard {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Card header */
    .qcard-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 22px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .q-tag {
      font-family: var(--head);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: var(--green);
      background: rgba(0, 232, 122, 0.08);
      border: 1px solid rgba(0, 232, 122, 0.2);
      padding: 3px 9px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .q-topic {
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .diff-badge {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 10px;
      letter-spacing: 0.5px;
      color: var(--red);
      border: 1px solid rgba(255, 51, 85, 0.3);
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(255, 51, 85, 0.06);
    }

    /* Code block */
    .code-area {
      background: var(--code-bg);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .code-lang {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
      pointer-events: none;
    }

    .code-area pre {
      padding: 18px 22px 18px 22px;
      font-size: 12px;
      line-height: 1.7;
      overflow-x: auto;
      color: #9ab8cc;
      font-family: var(--mono);
      tab-size: 4;
    }

    /* Syntax tokens */
    .kw {
      color: #f07070;
    }

    .tp {
      color: #ffa060;
    }

    .fn {
      color: #70b8f0;
    }

    .cl {
      color: #f0d878;
    }

    .st {
      color: #90d870;
    }

    .cm {
      color: var(--dim);
      font-style: italic;
    }

    .nu {
      color: #c090ff;
    }

    .op {
      color: #60c8f0;
    }

    .pp {
      color: #f0a0f0;
    }

    /* Prompt */
    .q-prompt {
      padding: 14px 22px 12px;
      font-size: 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .q-prompt strong {
      color: var(--amber);
    }

    /* Options */
    .options-grid {
      padding: 14px 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .opt {
      display: flex;
      align-items: baseline;
      gap: 11px;
      padding: 10px 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, opacity 0.15s;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text);
      background: transparent;
      text-align: left;
      width: 100%;
      line-height: 1.5;
    }

    .opt:hover:not([disabled]) {
      border-color: rgba(0, 232, 122, 0.45);
      background: rgba(0, 232, 122, 0.04);
    }

    .opt[disabled] {
      cursor: default;
    }

    .opt-lbl {
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.5px;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 16px;
    }

    .opt-code {
      color: var(--amber);
      word-break: break-word;
    }

    /* Option states */
    .opt.state-correct {
      border-color: var(--green) !important;
      background: rgba(0, 232, 122, 0.09) !important;
    }

    .opt.state-correct .opt-lbl {
      color: var(--green);
    }

    .opt.state-wrong {
      border-color: var(--red) !important;
      background: rgba(255, 51, 85, 0.09) !important;
    }

    .opt.state-wrong .opt-lbl {
      color: var(--red);
    }

    .opt.state-dim {
      opacity: 0.3;
    }

    /* Feedback row */
    .feedback {
      display: none;
      margin: 0 22px 4px;
      padding: 9px 14px;
      border-radius: 7px;
      font-size: 11.5px;
      font-weight: 600;
      align-items: center;
      gap: 8px;
    }

    .feedback.show {
      display: flex;
    }

    .feedback.fb-ok {
      background: rgba(0, 232, 122, 0.08);
      border: 1px solid rgba(0, 232, 122, 0.25);
      color: var(--green);
    }

    .feedback.fb-bad {
      background: rgba(255, 51, 85, 0.08);
      border: 1px solid rgba(255, 51, 85, 0.25);
      color: var(--red);
    }

    .fb-icon {
      font-size: 14px;
    }

    /* Explanation */
    .expl {
      display: none;
      margin: 6px 22px 18px;
      padding: 13px 15px;
      border-radius: 7px;
      font-size: 11.5px;
      line-height: 1.75;
      color: #7aa8c8;
      background: rgba(61, 168, 255, 0.05);
      border: 1px solid rgba(61, 168, 255, 0.13);
    }

    .expl.show {
      display: block;
    }

    .expl-hd {
      font-family: var(--head);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--blue);
      margin-bottom: 6px;
    }

    .expl code {
      background: rgba(255, 255, 255, 0.07);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--amber);
      font-size: 11px;
    }

    /* ── NAV ─────────────────────────────────────── */
    #nav-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 18px;
    }

    .nav-btn {
      font-family: var(--mono);
      font-size: 11.5px;
      font-weight: 600;
      padding: 9px 22px;
      border-radius: 7px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.15s ease;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--green);
      color: var(--green);
    }

    .nav-btn:disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }

    .nav-btn.accent {
      border-color: rgba(0, 232, 122, 0.35);
      background: rgba(0, 232, 122, 0.07);
      color: var(--green);
    }

    .nav-btn.accent:hover:not(:disabled) {
      background: rgba(0, 232, 122, 0.14);
      box-shadow: 0 0 14px rgba(0, 232, 122, 0.2);
    }

    /* Dot map */
    #dot-map {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      align-items: center;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .dot:hover {
      background: var(--muted);
      transform: scale(1.3);
    }

    .dot.d-cur {
      background: var(--green);
      box-shadow: 0 0 7px rgba(0, 232, 122, 0.7);
      transform: scale(1.2);
    }

    .dot.d-ok {
      background: var(--green);
      opacity: 0.55;
    }

    .dot.d-bad {
      background: var(--red);
      opacity: 0.65;
    }

    /* ── FINAL SCREEN ────────────────────────────── */
    #final {
      display: none;
      text-align: center;
      padding: 56px 24px 80px;
      animation: fadeUp 0.4s ease both;
    }

    .fin-title {
      font-family: var(--head);
      font-size: 36px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .fin-pct {
      font-family: var(--head);
      font-size: 80px;
      font-weight: 800;
      line-height: 1;
      margin: 16px 0 4px;
      transition: color 0.4s;
    }

    .fin-msg {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .fin-stats {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .fin-stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 28px;
      min-width: 110px;
    }

    .fin-stat-n {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .fin-stat-l {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .fin-restart {
      font-family: var(--mono);
      font-size: 12.5px;
      font-weight: 600;
      padding: 13px 36px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid rgba(0, 232, 122, 0.4);
      background: rgba(0, 232, 122, 0.07);
      color: var(--green);
      transition: all 0.18s;
      letter-spacing: 0.3px;
    }

    .fin-restart:hover {
      background: rgba(0, 232, 122, 0.15);
      box-shadow: 0 0 18px rgba(0, 232, 122, 0.25);
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <div id="topbar">
    <div class="logo">C<em>++</em> PhD <em>//</em> OOP</div>
    <div class="bar-track">
      <div class="bar-fill" id="pbar"></div>
    </div>
    <div id="score-badge">Score&nbsp;<span id="sc-val">0</span>/30</div>
    <div id="q-label">Q<span id="qn">1</span>/30</div>
  </div>

  <div id="wrap">
    <div id="quiz-view">
      <div class="qcard" id="qcard"></div>
      <div id="nav-row">
        <button class="nav-btn" id="btn-prev" onclick="go(-1)" disabled>&#8592; Prev</button>
        <div id="dot-map"></div>
        <button class="nav-btn accent" id="btn-next" onclick="go(1)">Next &#8594;</button>
      </div>
    </div>
    <div id="final"></div>
  </div>

  <script>
    /* ════════════════════════════════════════════════════════════
       QUESTION DATA  (correct: 0=A, 1=B, 2=C, 3=D)
    ════════════════════════════════════════════════════════════ */
    const Q = [

      /* ── 01 ── correct: 1 (B) ──────────────────── */
      {
        topic: "Virtual Inheritance — Mutating Shared Base",
        code:
          `#include <iostream>
using namespace std;
struct Base {
    int x;
    Base(int v) : x(v)  { cout << "B:" << x << " "; }
    virtual ~Base()      { cout << "~B:" << x << " "; }
    virtual int val()    { return x; }
};
struct L : virtual Base {
    int ly;
    L(int v) : Base(v*2), ly(v) { x += 5; cout << "L:" << x << " "; }
    int val() override   { return x + ly; }
};
struct R : virtual Base {
    int ry;
    R(int v) : Base(v*3), ry(v) { x *= 2; cout << "R:" << x << " "; }
    int val() override   { return x * ry; }
};
struct D : L, R {
    D(int v) : Base(v), L(v), R(v) { cout << "D:" << x << " "; }
    int val() override   { return L::val() + R::val(); }
};
int main() {
    D d(3);
    cout << d.val() << " ";
    Base* bp = &d;
    cout << bp->val();
    return 0;
}`,
        opts: [
          `B:6 L:11 B:9 R:24 D:24 35 35`,
          `B:3 L:8 R:16 D:16 67 67`,
          `B:3 L:8 R:16 D:16 19 19`,
          `B:6 L:11 R:22 D:22 67 67`
        ],
        correct: 1,
        expl: `With <code>virtual</code> inheritance, <code>D</code> controls <code>Base</code>: <code>Base(3)</code> so x=3. <code>L(3)</code> body: x+=5→8, ly=3. <code>R(3)</code> body: x*=2→16, ry=3. <code>D::val()</code>=<code>L::val()+R::val()</code>=(x+ly)+(x*ry)=(16+3)+(16×3)=19+48=67. Virtual dispatch via <code>Base*</code> also gives 67.`
      },

      /* ── 02 ── correct: 2 (C) ──────────────────── */
      {
        topic: "Default Args — 3-Level Multiplication Trap",
        code:
          `#include <iostream>
using namespace std;
class A {
public:
    virtual void f(int x=1, int y=1) { cout << "A:" << x+y << " "; }
    virtual ~A(){}
};
class B : public A {
public:
    void f(int x=2, int y=2) override { cout << "B:" << x+y << " "; }
};
class C : public B {
public:
    void f(int x=4, int y=4) override { cout << "C:" << x*y << " "; }
};
int main() {
    C c;
    A* pa = &c;
    B* pb = &c;
    C* pc = &c;
    pa->f();     
    pb->f();    
    pc->f();     
    pa->f(3);    
    pb->f(3);    
    return 0;
}`,
        opts: [
          `C:2 C:4 C:16 C:4 C:6`,
          `A:2 B:4 C:16 A:4 B:5`,
          `C:1 C:4 C:16 C:3 C:6`,
          `C:8 C:16 C:32 C:3 C:6`
        ],
        correct: 2,
        expl: `The function body dispatched is always <code>C::f</code> (virtual), which computes <code>x*y</code> (multiplication, not addition!). Default arguments come from the <em>static type of the pointer</em> at compile time: <code>A*</code>→(1,1), <code>B*</code>→(2,2), <code>C*</code>→(4,4). <code>pa->f(3)</code>: x=3 explicit, y=1 from A → 3×1=3. <code>pb->f(3)</code>: y=2 from B → 3×2=6.`
      },

      /* ── 03 ── correct: 0 (A) ──────────────────── */
      {
        topic: "Object Slicing — Value vs Reference vs Pointer",
        code:
          `#include <iostream>
using namespace std;
class P {
public:
    int a = 1;
    virtual string id() { return "P" + to_string(a); }
    void info() { cout << id() << " "; }
};
class Q : public P {
public:
    int b = 2;
    string id() override { return "Q" + to_string(a) + to_string(b); }
};
class R : public Q {
public:
    int c = 3;
    string id() override { return "R" + to_string(a+b+c); }
};
int main() {
    R r;
    Q q = r;    
    P p = r;    
    r.info();  
    q.info();    
    p.info();   
    P& pr = r;   
    pr.info();  
    return 0;
}`,
        opts: [
          `R6 Q12 P1 R6`,
          `R6 R6 R6 R6`,
          `R6 Q12 P1 Q12`,
          `P1 Q12 R6 R6`
        ],
        correct: 0,
        expl: `<code>Q q = r</code>: copies only Q part, vtable→Q. <code>P p = r</code>: copies only P part, vtable→P. <code>r.info()</code>→<code>R::id()</code>= "R"+(1+2+3)="R6". <code>q.info()</code>→<code>Q::id()</code>="Q12". <code>p.info()</code>→<code>P::id()</code>="P1". <code>pr</code> is a reference → no copy, original vtable preserved → "R6".`
      },

      /* ── 04 ── correct: 3 (D) ──────────────────── */
      {
        topic: "Constructor Exception — Partial Destruction",
        code:
          `#include <iostream>
using namespace std;
struct T {
    char c;
    T(char v) : c(v) { cout << '+' << c; }
    ~T()             { cout << '-' << c; }
};
class Bad {
    T t1, t2, t3;
public:
    Bad() : t1('A'), t2('B'), t3('C') {
        cout << '!';
        throw 42;
        cout << '?';
    }
    ~Bad() { cout << '~'; }
};
int main() {
    try {
        Bad b;
    } catch(int) {
        cout << 'X';
    }
    return 0;
}`,
        opts: [
          `+A+B+C!~-C-B-AX`,
          `+A+B+C!-C-B-A~X`,
          `+A+B+C!~X`,
          `+A+B+C!-C-B-AX`
        ],
        correct: 3,
        expl: `Members t1, t2, t3 are constructed in declaration order. Body executes '!', then <code>throw 42</code>. Because <code>Bad</code>'s constructor threw, the object is never fully constructed → <code>~Bad</code> is <em>never called</em>. All successfully-constructed members are destroyed in reverse order: ~t3→'-C', ~t2→'-B', ~t1→'-A'. Then catch executes 'X'.`
      },

      /* ── 05 ── correct: 1 (B) ──────────────────── */
      {
        topic: "Private Virtual NVI — 3-Level Explicit Call Chain",
        code:
          `#include <iostream>
using namespace std;
class Engine {
    virtual int power() const  { return 100; }
    virtual string kind() const{ return "base"; }
public:
    void spec() const {
        cout << kind() << ":" << power() << " ";
    }
};
class Turbo : public Engine {
    int boost;
    int power()    const override { return Engine::power()*2 + boost; }
    string kind()  const override { return "turbo"; }
public:
    Turbo(int b) : boost(b) {}
};
class TwinTurbo : public Turbo {
    int power()    const override { return Turbo::power() + 500; }
    string kind()  const override { return "twin"; }
public:
    TwinTurbo(int b) : Turbo(b) {}
};
int main() {
    Engine e; Turbo t(50); TwinTurbo tt(50);
    Engine* ep = &tt;
    e.spec();
    t.spec();
    tt.spec();
    ep->spec();
    return 0;
}`,
        opts: [
          `base:100 turbo:250 twin:750 base:100`,
          `base:100 turbo:250 twin:750 twin:750`,
          `base:100 turbo:200 twin:700 twin:700`,
          `base:100 turbo:250 twin:250 twin:750`
        ],
        correct: 1,
        expl: `Private virtuals: accessible only within class body but <em>overridable</em>. Explicit <code>Engine::power()</code> inside <code>Turbo::power()</code> bypasses vtable → always 100. <code>Turbo::power(50)</code>=100×2+50=250. <code>TwinTurbo::power</code> calls <code>Turbo::power()</code> explicitly→250, +500=750. <code>ep->spec()</code>: virtual dispatch → <code>TwinTurbo</code>'s kind+power = "twin:750".`
      },

      /* ── 06 ── correct: 2 (C) ──────────────────── */
      {
        topic: "Diamond with Virtual — Shared age, name() Dispatch",
        code:
          `#include <iostream>
using namespace std;
class Animal {

    const state = {
      cur: 0,
      sel: new Array(Q.length).fill(null)  // null | 0-3

    function getScore() {
      return state.sel.reduce((s, v, i) => s + (v === Q[i].correct ? 1 : 0), 0);
    }

    /* ════════════════════════════════════════════════════════════
       RENDER HELPERS
    ════════════════════════════════════════════════════════════ */
    const LABELS = ['A', 'B', 'C', 'D'];

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function colorCode(raw) {
      let s = esc(raw);
      const regex = /(#\w+[^\n]*)|(\/\/[^\n]*)|(&quot;[^&\n]*&quot;)|('(?:[^'\\]|\\.)')|\b(class|struct|public|private|protected|virtual|override|final|return|new|delete|using|namespace|static|const|void|int|long|double|string|bool|auto|nullptr|true|false|template|typename|throw|try|catch|explicit|this|for|while|if|else|inline)\b|\b(cout|cin|endl|printf|dynamic_cast|static_cast|typeid)\b|\b([A-Z][A-Za-z0-9_]*)\b|\b(\d+\.?\d*[Lf]?)\b/g;

      return s.replace(regex, (match, pp, cm, st1, st2, kw, fn, cl, nu) => {
        if (pp) return `<span class="pp">${pp}</span>`;
        if (cm) return `<span class="cm">${cm}</span>`;
        if (st1) return `<span class="st">${st1}</span>`;
        if (st2) return `<span class="st">${st2}</span>`;
        if (kw) return `<span class="kw">${kw}</span>`;
        if (fn) return `<span class="fn">${fn}</span>`;
        if (cl) return `<span class="cl">${cl}</span>`;
        if (nu) return `<span class="nu">${nu}</span>`;
        return match;
      });
    }

    /* ════════════════════════════════════════════════════════════
       RENDER QUESTION
    ════════════════════════════════════════════════════════════ */
    function renderQ() {
      const i = state.cur;
      const q = Q[i];
      const sel = state.sel[i]; // null or 0-3
      const answered = sel !== null;
      const correct = answered && sel === q.correct;

      /* top bar */
      const pct = ((state.sel.filter(x => x !== null).length) / Q.length * 100).toFixed(1);
      document.getElementById('pbar').style.width = pct + '%';
      document.getElementById('sc-val').textContent = getScore();
      document.getElementById('qn').textContent = i + 1;

      /* options HTML */
      const optsHtml = q.opts.map((opt, oi) => {
        let cls = 'opt';
        if (answered) {
          cls += ' ';
          if (oi === q.correct) cls += 'state-correct';
          else if (oi === sel) cls += 'state-wrong';
          else cls += 'state-dim';
        }
        const dis = answered ? 'disabled' : '';
        return `<button class="${cls}" ${dis} onclick="choose(${i},${oi})">
              <span class="opt-lbl">${LABELS[oi]}</span>
              <code class="opt-code">${esc(opt)}</code>
            </button>`;
      }).join('');

      /* feedback */
      const fbShow = answered ? 'show' : '';
      const fbCls = correct ? 'fb-ok' : 'fb-bad';
      const fbTxt = correct
        ? '<span class="fb-icon">✓</span> Correct!'
        : `<span class="fb-icon">✗</span> Wrong — correct is <strong>${LABELS[q.correct]}</strong>`;

      /* card */
      document.getElementById('qcard').innerHTML = `
    <div class="qcard-head">
      <span class="q-tag">Q${i + 1} / ${Q.length}</span>
      <span class="q-topic">${esc(q.topic)}</span>
      <span class="diff-badge">&#9670; PhD</span>
    </div>
    <div class="code-area">
      <span class="code-lang">C++</span>
      <pre>${colorCode(q.code)}</pre>
    </div>
    <div class="q-prompt">
      <strong>▸</strong> What is the <strong>exact output</strong> to stdout?
    </div>
    <div class="options-grid">${optsHtml}</div>
    <div class="feedback ${fbCls} ${fbShow}">${fbTxt}</div>
    <div class="expl ${answered ? 'show' : ''}">
      <div class="expl-hd">// EXPLANATION</div>
      ${q.expl}
    </div>
  `;

      /* nav buttons */
      document.getElementById('btn-prev').disabled = i === 0;
      document.getElementById('btn-next').textContent = i === Q.length - 1 ? 'Finish ✓' : 'Next →';

      renderDots();
    }

    /* ════════════════════════════════════════════════════════════
       DOT MAP
    ════════════════════════════════════════════════════════════ */
    function renderDots() {
      document.getElementById('dot-map').innerHTML = Q.map((_, i) => {
        const sel = state.sel[i];
        let cls = 'dot';
        if (i === state.cur) cls += ' d-cur';
        else if (sel === null) cls += '';
        else if (sel === Q[i].correct) cls += ' d-ok';
        else cls += ' d-bad';
        return `<div class="${cls}" onclick="jump(${i})" title="Q${i + 1}"></div>`;
      }).join('');
    }

    /* ════════════════════════════════════════════════════════════
       ACTIONS
    ════════════════════════════════════════════════════════════ */
    function choose(qIdx, optIdx) {
      if (state.sel[qIdx] !== null) return;   // already answered
      state.sel[qIdx] = optIdx;
      renderQ();
    }

    function go(dir) {
      const next = state.cur + dir;
      if (next >= Q.length) { showFinal(); return; }
      if (next < 0) return;
      state.cur = next;
      renderQ();
    }

    function jump(i) {
      state.cur = i;
      renderQ();
    }

    /* ════════════════════════════════════════════════════════════
       FINAL SCREEN
    ════════════════════════════════════════════════════════════ */
    function showFinal() {
      document.getElementById('quiz-view').style.display = 'none';
      const fin = document.getElementById('final');
      fin.style.display = 'block';

      const score = getScore();
      const wrong = state.sel.filter((v, i) => v !== null && v !== Q[i].correct).length;
      const skipped = state.sel.filter(v => v === null).length;
      const pct = Math.round(score / Q.length * 100);

      const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
      const msg = pct >= 80 ? '🔥 Elite. You think like a C++ compiler.'
        : pct >= 60 ? '⚡ Strong. A few vtable traps caught you.'
          : pct >= 40 ? '📖 Keep grinding — these are PhD traps.'
            : '🧩 Brutal, but now you know. Retry!';

      fin.innerHTML = `
    <div class="fin-title">Quiz Complete</div>
    <div class="fin-pct" style="color:${color}">${pct}%</div>
    <div class="fin-msg">${msg}</div>
    <div class="fin-stats">
      <div class="fin-stat">
        <div class="fin-stat-n" style="color:var(--green)">${score}</div>
        <div class="fin-stat-l">CORRECT</div>
      </div>
      <div class="fin-stat">
        <div class="fin-stat-n" style="color:var(--red)">${wrong}</div>
        <div class="fin-stat-l">WRONG</div>
      </div>
      <div class="fin-stat">
        <div class="fin-stat-n" style="color:var(--amber)">${skipped}</div>
        <div class="fin-stat-l">SKIPPED</div>
      </div>
      <div class="fin-stat">
        <div class="fin-stat-n" style="color:var(--purple)">${Q.length}</div>
        <div class="fin-stat-l">TOTAL</div>
      </div>
    </div>
    <button class="fin-restart" onclick="restart()">&#8635; Restart Quiz</button>
  `;
    }

    function restart() {
      state.cur = 0;
      state.sel.fill(null);
      document.getElementById('final').style.display = 'none';
      document.getElementById('quiz-view').style.display = 'block';
      renderQ();
    }

    /* ════════════════════════════════════════════════════════════
       BOOT
    ════════════════════════════════════════════════════════════ */
    renderQ();
  </script>
